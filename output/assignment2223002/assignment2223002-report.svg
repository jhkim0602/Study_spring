<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2200" viewBox="0 0 1600 2200" role="img" aria-labelledby="title desc">
  <title id="title">B반 2223002 김정환 과제 #1 인포그래픽</title>
  <desc id="desc">학생 정보 입력 및 리스트 저장 프로그램의 요구사항, 구현 구조, 실행 흐름, 조건 대응표를 정리한 보고서형 인포그래픽</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="header" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
    <style>
      .page { fill: url(#bg); }
      .card { fill: #ffffff; stroke: #dbe4f0; stroke-width: 2; rx: 24; filter: url(#shadow); }
      .header { fill: url(#header); rx: 28; }
      .h1 { font: 800 44px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; fill: #ffffff; }
      .h2 { font: 800 30px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; fill: #0f172a; }
      .h3 { font: 700 22px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; fill: #1e293b; }
      .body { font: 500 18px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; fill: #334155; }
      .small { font: 500 15px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; fill: #475569; }
      .mono { font: 600 18px Menlo, Monaco, 'Courier New', monospace; fill: #0f172a; }
      .code { fill: #0f172a; rx: 18; }
      .codeText { font: 500 17px Menlo, Monaco, 'Courier New', monospace; fill: #e2e8f0; }
      .pill { fill: #dbeafe; rx: 16; }
      .pillText { font: 700 16px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; fill: #1d4ed8; }
      .accent { fill: #1d4ed8; }
      .accent2 { fill: #0f766e; }
      .accent3 { fill: #7c3aed; }
      .accent4 { fill: #ea580c; }
      .line { stroke: #94a3b8; stroke-width: 3; fill: none; stroke-linecap: round; }
      .dash { stroke-dasharray: 10 10; }
      .node { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .stepCircle { fill: #1d4ed8; }
      .stepNo { font: 800 20px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .tableHead { fill: #eff6ff; }
      .tableCell { fill: #ffffff; }
      .divider { stroke: #cbd5e1; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1600" height="2200"/>

  <rect class="header" x="70" y="50" width="1460" height="250"/>
  <text class="small" x="120" y="105" fill="#cbd5e1">SPRING CONTAINER REPORT / ASSIGNMENT INFOGRAPHIC</text>
  <text class="h1" x="120" y="165">B반 2223002 김정환 과제 #1</text>
  <text class="h2" x="120" y="220" fill="#dbeafe">학생 정보 입력 및 리스트 저장 프로그램 구현 보고서</text>
  <text class="body" x="120" y="265" fill="#e2e8f0">Java Config 기반 콘솔형 Spring 과제 / DI, 외부 프로퍼티, ApplicationContextAware, InitializingBean, destroyMethod 적용</text>

  <rect class="pill" x="1130" y="110" width="320" height="46"/>
  <text class="pillText" x="1160" y="140">패키지명: Lect_B.assignment2223002</text>
  <rect class="pill" x="1130" y="175" width="320" height="46" fill="#dcfce7"/>
  <text class="pillText" x="1160" y="205" fill="#15803d">과제 핵심: 조건 충족 + 학습 범위 준수</text>

  <rect class="card" x="70" y="350" width="690" height="520"/>
  <text class="h2" x="110" y="405">1. 과제 요구사항 요약</text>
  <text class="body" x="110" y="455">학생의 성명과 학번 정보를 입력받아 리스트에 저장하고</text>
  <text class="body" x="110" y="485">프로그램 종료 시 결과를 출력하는 Spring 기반 프로그램 작성</text>

  <circle cx="120" cy="545" r="9" class="accent"/>
  <text class="body" x="145" y="552">C1) 학생 정보는 <tspan font-weight="700">StdInfo</tspan> 타입 객체에 저장</text>
  <circle cx="120" cy="605" r="9" class="accent"/>
  <text class="body" x="145" y="612">C2) 입력할 학생 수는 외부 <tspan font-weight="700">프로퍼티 파일</tspan>에 등록</text>
  <circle cx="120" cy="665" r="9" class="accent"/>
  <text class="body" x="145" y="672">C3) <tspan font-weight="700">StdInfo 리스트</tspan>와 학생 수는 <tspan font-weight="700">DI</tspan>로 StdManager 속성 저장</text>
  <circle cx="120" cy="725" r="9" class="accent"/>
  <text class="body" x="145" y="732">C4) StdManager는 <tspan font-weight="700">ApplicationContextAware</tspan>,</text>
  <text class="body" x="175" y="760"><tspan font-weight="700">InitializingBean</tspan> 구현 클래스로 작성</text>
  <circle cx="120" cy="800" r="9" class="accent"/>
  <text class="body" x="145" y="807">C5) 리스트에 추가되는 StdInfo 객체는 <tspan font-weight="700">StdManager에서 획득</tspan></text>
  <circle cx="120" cy="855" r="9" class="accent"/>
  <text class="body" x="145" y="862">C6) 출력은 StdManager의 <tspan font-weight="700">destroyMethod 지정 메서드</tspan> 사용</text>

  <rect class="card" x="840" y="350" width="690" height="520"/>
  <text class="h2" x="880" y="405">2. 구현 방향</text>
  <text class="body" x="880" y="455">이번 과제는 웹 화면보다 Spring 객체 관리 조건이 핵심이라서</text>
  <text class="body" x="880" y="485">수업 범위 안에서 가장 자연스러운 콘솔형 프로그램으로 구현함</text>

  <rect x="880" y="530" width="610" height="62" rx="18" fill="#eff6ff"/>
  <text class="h3" x="910" y="570">구현 선택</text>
  <text class="body" x="1030" y="570">Java Config + AnnotationConfigApplicationContext</text>

  <rect x="880" y="615" width="610" height="62" rx="18" fill="#ecfeff"/>
  <text class="h3" x="910" y="655">객체 생성 방식</text>
  <text class="body" x="1030" y="655">StdInfo는 prototype, List와 StdManager는 bean 등록</text>

  <rect x="880" y="700" width="610" height="62" rx="18" fill="#f5f3ff"/>
  <text class="h3" x="910" y="740">설정 관리</text>
  <text class="body" x="1030" y="740">assignment2223002.properties에서 student-count 읽기</text>

  <rect x="880" y="785" width="610" height="62" rx="18" fill="#fff7ed"/>
  <text class="h3" x="910" y="825">출력 시점</text>
  <text class="body" x="1030" y="825">main에서 직접 출력하지 않고 destroyMethod로 자동 출력</text>

  <rect class="code" x="880" y="885" width="610" height="160"/>
  <text class="codeText" x="910" y="925">핵심 포인트</text>
  <text class="codeText" x="910" y="965">- 패키지명에 학번 포함</text>
  <text class="codeText" x="910" y="1000">- 과제 조건을 전부 Spring 기능과 연결</text>
  <text class="codeText" x="910" y="1035">- 과도한 확장 없이 학생 과제 수준 유지</text>

  <rect class="card" x="70" y="920" width="1460" height="620"/>
  <text class="h2" x="110" y="980">3. 클래스 구조 및 의존 관계</text>

  <rect class="node" x="120" y="1080" width="260" height="120"/>
  <text class="h3" x="150" y="1130">Assignment2223002Main</text>
  <text class="small" x="150" y="1170">- 컨테이너 생성</text>
  <text class="small" x="150" y="1195">- stdManager 획득</text>

  <rect class="node" x="470" y="1035" width="320" height="210"/>
  <text class="h3" x="500" y="1090">Assignment2223002Config</text>
  <text class="small" x="500" y="1130">- @Configuration</text>
  <text class="small" x="500" y="1158">- @PropertySource</text>
  <text class="small" x="500" y="1186">- stdInfo() prototype bean</text>
  <text class="small" x="500" y="1214">- stdInfoList() bean</text>
  <text class="small" x="500" y="1242">- stdManager(..., @Value) bean</text>

  <rect class="node" x="910" y="1035" width="330" height="250"/>
  <text class="h3" x="940" y="1090">StdManager</text>
  <text class="small" x="940" y="1130">- List&lt;StdInfo&gt; DI</text>
  <text class="small" x="940" y="1158">- studentCount DI</text>
  <text class="small" x="940" y="1186">- ApplicationContextAware</text>
  <text class="small" x="940" y="1214">- InitializingBean</text>
  <text class="small" x="940" y="1242">- inputStudents()</text>
  <text class="small" x="940" y="1270">- printResult() = destroyMethod</text>

  <rect class="node" x="1310" y="1020" width="170" height="125"/>
  <text class="h3" x="1340" y="1070">StdInfo</text>
  <text class="small" x="1340" y="1105">name / studentId</text>
  <text class="small" x="1340" y="1132">prototype bean</text>

  <rect class="node" x="1310" y="1180" width="170" height="125"/>
  <text class="h3" x="1335" y="1230">properties</text>
  <text class="small" x="1340" y="1265">student-count</text>
  <text class="small" x="1340" y="1292">외부 설정값</text>

  <rect class="node" x="1310" y="1340" width="170" height="125"/>
  <text class="h3" x="1342" y="1390">List&lt;StdInfo&gt;</text>
  <text class="small" x="1340" y="1425">학생 정보 저장 리스트</text>

  <path class="line" d="M380 1140 C420 1140, 430 1140, 470 1140"/>
  <polygon points="460,1132 478,1140 460,1148" fill="#94a3b8"/>
  <path class="line" d="M790 1140 C840 1140, 850 1140, 910 1140"/>
  <polygon points="900,1132 918,1140 900,1148" fill="#94a3b8"/>
  <path class="line" d="M1240 1105 C1270 1105, 1275 1085, 1310 1085"/>
  <polygon points="1300,1077 1318,1085 1300,1093" fill="#94a3b8"/>
  <path class="line" d="M1240 1165 C1270 1165, 1275 1245, 1310 1245"/>
  <polygon points="1300,1237 1318,1245 1300,1253" fill="#94a3b8"/>
  <path class="line" d="M1240 1225 C1270 1225, 1275 1405, 1310 1405"/>
  <polygon points="1300,1397 1318,1405 1300,1413" fill="#94a3b8"/>

  <text class="small" x="1215" y="1076" fill="#1d4ed8">getBean()</text>
  <text class="small" x="1200" y="1232" fill="#0f766e">@Value</text>
  <text class="small" x="1188" y="1416" fill="#7c3aed">DI</text>

  <rect class="code" x="120" y="1310" width="980" height="185"/>
  <text class="codeText" x="150" y="1355">핵심 코드 조합</text>
  <text class="codeText" x="150" y="1400">@Bean(destroyMethod = "printResult")</text>
  <text class="codeText" x="150" y="1438">StdManager stdManager(List&lt;StdInfo&gt; stdInfoList,</text>
  <text class="codeText" x="190" y="1476">@Value("${assignment2223002.student-count}") int studentCount)</text>

  <rect class="card" x="70" y="1590" width="820" height="530"/>
  <text class="h2" x="110" y="1650">4. 실행 흐름</text>

  <circle class="stepCircle" cx="145" cy="1735" r="28"/><text class="stepNo" x="145" y="1738">1</text>
  <text class="body" x="190" y="1742">main 실행 -> AnnotationConfigApplicationContext 생성</text>
  <path class="line dash" d="M145 1768 L145 1815"/>

  <circle class="stepCircle" cx="145" cy="1860" r="28"/><text class="stepNo" x="145" y="1863">2</text>
  <text class="body" x="190" y="1867">Config 읽기 -> stdInfo, stdInfoList, stdManager bean 등록</text>
  <path class="line dash" d="M145 1893 L145 1940"/>

  <circle class="stepCircle" cx="145" cy="1985" r="28"/><text class="stepNo" x="145" y="1988">3</text>
  <text class="body" x="190" y="1992">student-count 주입 완료 -> afterPropertiesSet() 실행</text>
  <path class="line dash" d="M145 2018 L145 2065"/>

  <circle class="stepCircle" cx="145" cy="2110" r="28"/><text class="stepNo" x="145" y="2113">4</text>
  <text class="body" x="190" y="2117">학생 수만큼 StdManager가 context.getBean("stdInfo") 호출</text>

  <circle class="stepCircle" cx="555" cy="1735" r="28"/><text class="stepNo" x="555" y="1738">5</text>
  <text class="body" x="600" y="1742">입력받은 이름, 학번을 StdInfo에 저장 후 리스트에 추가</text>
  <path class="line dash" d="M555 1768 L555 1815"/>

  <circle class="stepCircle" cx="555" cy="1860" r="28"/><text class="stepNo" x="555" y="1863">6</text>
  <text class="body" x="600" y="1867">try-with-resources 종료 -> 컨텍스트 close</text>
  <path class="line dash" d="M555 1893 L555 1940"/>

  <circle class="stepCircle" cx="555" cy="1985" r="28"/><text class="stepNo" x="555" y="1988">7</text>
  <text class="body" x="600" y="1992">destroyMethod = printResult() 자동 실행</text>
  <path class="line dash" d="M555 2018 L555 2065"/>

  <circle class="stepCircle" cx="555" cy="2110" r="28"/><text class="stepNo" x="555" y="2113">8</text>
  <text class="body" x="600" y="2117">저장된 전체 학생 정보와 총 인원 출력</text>

  <rect class="card" x="930" y="1590" width="600" height="530"/>
  <text class="h2" x="970" y="1650">5. 조건 대응표</text>

  <rect class="tableHead" x="970" y="1695" width="110" height="52"/>
  <rect class="tableHead" x="1080" y="1695" width="420" height="52"/>
  <text class="h3" x="1008" y="1729">조건</text>
  <text class="h3" x="1110" y="1729">반영 내용</text>

  <rect class="tableCell" x="970" y="1747" width="110" height="55"/><rect class="tableCell" x="1080" y="1747" width="420" height="55"/>
  <text class="body" x="1010" y="1781">C1</text><text class="body" x="1110" y="1781">StdInfo 객체에 학생 이름, 학번 저장</text>
  <rect class="tableCell" x="970" y="1802" width="110" height="55"/><rect class="tableCell" x="1080" y="1802" width="420" height="55"/>
  <text class="body" x="1010" y="1836">C2</text><text class="body" x="1110" y="1836">assignment2223002.properties 사용</text>
  <rect class="tableCell" x="970" y="1857" width="110" height="55"/><rect class="tableCell" x="1080" y="1857" width="420" height="55"/>
  <text class="body" x="1010" y="1891">C3</text><text class="body" x="1110" y="1891">List&lt;StdInfo&gt;, studentCount를 StdManager에 DI</text>
  <rect class="tableCell" x="970" y="1912" width="110" height="55"/><rect class="tableCell" x="1080" y="1912" width="420" height="55"/>
  <text class="body" x="1010" y="1946">C4</text><text class="body" x="1110" y="1946">ApplicationContextAware, InitializingBean 구현</text>
  <rect class="tableCell" x="970" y="1967" width="110" height="55"/><rect class="tableCell" x="1080" y="1967" width="420" height="55"/>
  <text class="body" x="1010" y="2001">C5</text><text class="body" x="1110" y="2001">StdManager에서 context.getBean("stdInfo") 호출</text>
  <rect class="tableCell" x="970" y="2022" width="110" height="55"/><rect class="tableCell" x="1080" y="2022" width="420" height="55"/>
  <text class="body" x="1010" y="2056">C6</text><text class="body" x="1110" y="2056">destroyMethod = printResult 로 종료 시 출력</text>

  <text class="h3" x="970" y="2120">핵심 적용 키워드</text>
  <rect class="pill" x="970" y="2145" width="106" height="38"/><text class="pillText" x="992" y="2170">@Configuration</text>
  <rect class="pill" x="1088" y="2145" width="80" height="38"/><text class="pillText" x="1110" y="2170">@Bean</text>
  <rect class="pill" x="1180" y="2145" width="90" height="38"/><text class="pillText" x="1206" y="2170">@Value</text>
  <rect class="pill" x="1282" y="2145" width="100" height="38"/><text class="pillText" x="1301" y="2170">prototype</text>
  <rect class="pill" x="1394" y="2145" width="86" height="38"/><text class="pillText" x="1418" y="2170">DI</text>
</svg>
