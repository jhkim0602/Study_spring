spring.application.name=lect_B
spring.mvc.view.prefix=/views/
spring.mvc.view.suffix=.jsp
message.greeting=hello, Spring DI with @Autowired and Setter Injection!

# Week 10 DB 연동 실습 (내장 H2 사용, MySQL 호환 모드)
spring.datasource.url=jdbc:h2:mem:springdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/week10-schema.sql
spring.sql.init.data-locations=classpath:sql/week10-data.sql
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console